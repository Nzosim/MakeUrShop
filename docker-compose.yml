services:
    frontend_backend:
        image: node:20-alpine
        container_name: vue_frontend_backend
        working_dir: /app
        ports:
            - '3000:3000'
        volumes:
            - ./front_back:/app
        command: sh -c "npm install && npm run dev"
        environment:
            - NODE_ENV=development

    db:
        image: mysql:8.0
        container_name: mysql_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: makeurshop
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
        ports:
            - '3306:3306'

    adminer:
        image: adminer
        container_name: adminer
        restart: always
        ports:
            - '8080:8080'
        depends_on:
            - db

volumes:
    mysql_data:
